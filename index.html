<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Editor</title>
<meta name="description" content="A fast, free markdown editor that runs entirely in your browser — live editable preview, find &amp; replace, checklists, tables, dark mode, RTL support, and PDF export. No sign-up, nothing to install.">
<meta name="google-site-verification" content="iUzAVwVoCbwaksN1UfkAlmeJM7Ra3eBklUvkdCkL15g">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <span class="brand">✎ MD Editor</span>
  <button id="clearBtn" title="Clear editor (undo with Ctrl+Z)">Clear</button>
  <button id="openBtn" title="Open a .md file">Open</button>
  <span class="menu" id="exportMenu">
    <button id="exportBtn" title="Export as…">Export ▾</button>
    <span class="menu-list">
      <button data-export="md">Markdown (.md)</button>
      <button data-export="pdf">PDF (.pdf)</button>
      <button data-export="html">HTML (.html)</button>
    </span>
  </span>
  <span class="menu" id="copyMenu">
    <button id="copyBtn" title="Copy as…">Copy ▾</button>
    <span class="menu-list">
      <button data-copy="md">Markdown</button>
      <button data-copy="text">Plain text</button>
      <button data-copy="html">HTML</button>
    </span>
  </span>
  <span class="spacer"></span>
  <button id="syncBtn" title="Sync scrolling between editor and preview">Sync Scroll</button>
  <button id="readBtn" title="Reading mode (Esc to leave)">Reading Mode</button>
  <button id="viewBtn" title="Switch which pane is shown">◫ Both</button>
  <button id="dirBtn" title="Toggle text direction (LTR / RTL)">⇄ RTL</button>
  <button id="themeBtn" title="Toggle dark / light">◑ Theme</button>
  <a id="ghLink" href="https://github.com/vahidaskari/md-editor" target="_blank" rel="noopener" title="View source on GitHub" aria-label="GitHub repository">
    <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown" hidden>
</header>

<!-- Find & replace bar (Ctrl/Cmd+F) -->
<div id="findbar" class="findbar" hidden>
  <input id="findInput" type="text" placeholder="Find" aria-label="Find" autocomplete="off">
  <input id="replaceInput" type="text" placeholder="Replace" aria-label="Replace with" autocomplete="off">
  <span id="findCount" class="find-count"></span>
  <button id="findPrev" title="Previous (Shift+Enter)">↑</button>
  <button id="findNext" title="Next (Enter)">↓</button>
  <button id="replaceOne" title="Replace">Replace</button>
  <button id="replaceAll" title="Replace all">Replace all</button>
  <button id="findClose" title="Close (Esc)">✕</button>
</div>

<main class="main">
  <div class="pane edit-pane">
    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off"
              autocapitalize="off" placeholder="# Write markdown here…"></textarea>
  </div>
  <div class="divider" id="divider" title="Drag to resize"></div>
  <div class="pane preview-pane">
    <div class="preview" id="preview"></div>
  </div>
</main>

<!-- Floating formatting toolbar for the editable preview -->
<div id="fmtbar" class="fmtbar" hidden>
  <button data-cmd="bold" title="Bold"><b>B</b></button>
  <button data-cmd="italic" title="Italic"><i>I</i></button>
  <button data-cmd="strike" title="Strikethrough"><s>S</s></button>
  <button data-cmd="code" title="Inline code">&lt;/&gt;</button>
  <span class="sep"></span>
  <span class="menu" id="hMenu">
    <button id="hBtn" title="Heading level">H▾</button>
    <span class="menu-list">
      <button data-cmd="h1" title="Heading 1">H1</button>
      <button data-cmd="h2" title="Heading 2">H2</button>
      <button data-cmd="h3" title="Heading 3">H3</button>
      <button data-cmd="h4" title="Heading 4">H4</button>
      <button data-cmd="h5" title="Heading 5">H5</button>
      <button data-cmd="h6" title="Heading 6">H6</button>
    </span>
  </span>
  <button data-cmd="quote" title="Quote">❝</button>
  <button data-cmd="ul" title="Bullet list">•</button>
  <button data-cmd="ol" title="Numbered list">1.</button>
  <button data-cmd="task" title="Checklist">☑</button>
  <span class="sep"></span>
  <button data-cmd="link" title="Add link">🔗</button>
  <button data-cmd="table" title="Insert table">▦</button>
</div>

<!-- Reading-mode exit (the header is hidden there) -->
<button id="readExit" class="read-exit" title="Leave reading mode (Esc)" aria-label="Leave reading mode">✕</button>

<!-- Drag & drop import overlay -->
<div id="dropzone" class="dropzone">
  <div class="box">⬇ Drop a <b>.md</b> file to import</div>
</div>

<div id="toasts"></div>

<footer>
  <span id="stat-words">0 words</span>
  <span id="stat-chars">0 chars</span>
  <span class="spacer"></span>
  <span class="credit">made with 🩶 by
    <a href="https://github.com/vahidaskari" target="_blank" rel="noopener">Vahid</a>
  </span>
</footer>

<!-- The only script on the critical path. The third-party libraries it needs for
     preview-editing and PDF export are fetched on demand (see app.js §5 / §8). -->
<script defer src="app.js"></script>
</body>
</html>
